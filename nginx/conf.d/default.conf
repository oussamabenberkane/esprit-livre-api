    listen 443 ssl http2;
    server_name pharma-resolve.com www.pharma-resolve.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/pharma-resolve.fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/pharma-resolve.privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
